name: Harness Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install harness
        run: |
          chmod +x harness
          echo "$PWD" >> $GITHUB_PATH

      - name: harness check
        # Skip harness-docs: this repo is the tool itself, not a project using it
        run: harness check --skip harness-docs --json
        env:
          CI: true
